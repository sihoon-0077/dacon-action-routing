run_name: xlmr_a
backbone: xlm-roberta-base
max_len: 320
epochs: 5
lr_encoder: 2.0e-5
lr_head: 1.0e-4
llrd_decay: 0.9
scheduler: cosine
warmup_ratio: 0.06
batch_size: 16
grad_accum: 2
weight_decay: 0.01
grad_clip: 1.0
fp16: true
seed: 42
label_smoothing: 0.03
coarse_loss_weight: 0.3
class_weight: none
eval_every: epoch
select_best_by: fold_val_nll_min
