run_name: xlmr_large_v2_320_gate
backbone: FacebookAI/xlm-roberta-large
serializer: v2_2
max_len: 320
epochs: 3
lr_encoder: 1.0e-5
lr_head: 1.0e-4
llrd_decay: 0.9
scheduler: cosine
warmup_ratio: 0.06
batch_size: 1
grad_accum: 32
weight_decay: 0.01
grad_clip: 1.0
fp16: true
seed: 42
label_smoothing: 0.03
coarse_loss_weight: 0.3
class_weight: none
eval_every: epoch
select_best_by: fold_val_macro_f1_max
gradient_checkpointing: true
trust_remote_code: false
