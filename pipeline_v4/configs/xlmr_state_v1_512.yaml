run_name: xlmr_state_v1_512
backbone: FacebookAI/xlm-roberta-base
serializer: xlmr_state_v1
max_len: 512
epochs: 3
lr_encoder: 3.0e-5
lr_head: 1.0e-4
llrd_decay: 0.9
scheduler: cosine
warmup_ratio: 0.06
batch_size: 4
grad_accum: 8
weight_decay: 0.01
grad_clip: 1.0
fp16: true
seed: 42
label_smoothing: 0.0
coarse_loss_weight: 0.3
class_weight: none
eval_every: epoch
select_best_by: fold_val_nll_min
